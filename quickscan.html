<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Serial Scan Studio v12</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { 
            --bg: #ffffff; 
            --card: #f8f9fa; 
            --accent: #6f42c1; 
            --text: #212529; 
            --border: #dee2e6; 
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: -apple-system, sans-serif; color: var(--text); overflow: hidden; }

        /* 主顯示區 (預設顯示紫色背景) */
        #main-viewer { 
            position: relative; 
            width: 100%; 
            height: 40%; 
            background: linear-gradient(135deg, #f3f0ff 0%, #e5dbff 100%); 
            overflow: hidden; 
            border-bottom: 1px solid var(--border); 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #freeze-frame { width: 100%; height: 100%; object-fit: contain; display: none; }
        #placeholder-text { color: var(--accent); font-weight: 500; font-size: 14px; opacity: 0.6; }

        /* 狀態列 */
        .status-bar { position: absolute; top: 15px; width: 100%; display: flex; justify-content: center; z-index: 10; pointer-events: none; }
        .badge { background: rgba(255,255,255,0.9); color: var(--accent); padding: 6px 14px; border-radius: 20px; font-size: 12px; border: 1px solid var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.05); font-weight: bold; }

        /* 底部控制面板 */
        .dashboard { position: absolute; bottom: 0; width: 100%; height: 60%; background: var(--bg); display: flex; flex-direction: column; border-radius: 24px 24px 0 0; border-top: 1px solid var(--border); }
        
        /* 檔案預覽滑軌 */
        .gallery-tray { display: flex; gap: 12px; padding: 15px; overflow-x: auto; background: var(--card); border-bottom: 1px solid var(--border); height: 90px; align-items: center; }
        .gallery-tray::-webkit-scrollbar { height: 4px; }
        .gallery-tray::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        
        .thumb { width: 65px; height: 65px; border-radius: 10px; object-fit: cover; opacity: 0.5; border: 2px solid transparent; transition: 0.2s; flex-shrink: 0; cursor: pointer; }
        .thumb.active { opacity: 1; border-color: var(--accent); transform: scale(1.05); box-shadow: 0 4px 10px rgba(111, 66, 193, 0.2); }

        /* 控制按鈕 (只保留批次上傳) */
        .action-area { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        button { border: none; border-radius: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.97); }

        #upload-btn { 
            background: var(--accent); 
            color: #ffffff; 
            padding: 18px; 
            font-size: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 10px;
            box-shadow: 0 6px 15px rgba(111, 66, 193, 0.3);
        }
        
        #clear-btn { background: transparent; color: #adb5bd; font-size: 12px; padding: 5px; margin-top: 5px; }

        /* 結果清單 */
        #result-list { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
        .list-header { font-size: 12px; color: #6c757d; padding: 15px 0 10px; border-bottom: 1px solid var(--border); margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        .code-row { background: var(--card); margin-bottom: 10px; padding: 14px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .code-val { font-family: 'Courier New', monospace; font-size: 15px; color: var(--accent); font-weight: bold; }
        .btn-sm { background: #ffffff; color: var(--text); padding: 8px 14px; border-radius: 8px; font-size: 12px; border: 1px solid var(--border); font-weight: 500; }
        .btn-sm.saved { background: var(--accent); color: #ffffff; border-color: var(--accent); }
        
        #file-input { display: none; }
        canvas#temp-canvas { display: none; }
    </style>
</head>
<body>

<div id="main-viewer">
    <div id="placeholder-text">等待上傳序號照片...</div>
    <img id="freeze-frame">
    <div class="status-bar"><div class="badge" id="status">批次處理模式</div></div>
</div>

<div class="dashboard">
    <div class="gallery-tray" id="gallery-tray">
        <span style="color:#adb5bd; font-size:12px; margin-left:10px;">點擊下方按鈕上傳多張照片</span>
    </div>

    <div class="action-area">
        <button id="upload-btn">📂 批次選擇照片並掃描</button>
        <button id="clear-btn">清空所有掃描記錄</button>
    </div>

    <div id="result-list">
        <div class="list-header">
            <span>掃描結果 (19 位序號)</span>
            <span id="result-count">0 組</span>
        </div>
        <div id="codes-container"></div>
    </div>
</div>

<input type="file" id="file-input" multiple accept="image/*">
<canvas id="temp-canvas"></canvas>

<script>
    const freezeFrame = document.getElementById('freeze-frame');
    const placeholderText = document.getElementById('placeholder-text');
    const tempCanvas = document.getElementById('temp-canvas');
    const uploadBtn = document.getElementById('upload-btn');
    const fileInput = document.getElementById('file-input');
    const galleryTray = document.getElementById('gallery-tray');
    const codesContainer = document.getElementById('codes-container');
    const resultList = document.getElementById('result-list');
    const statusBadge = document.getElementById('status');
    const resultCount = document.getElementById('result-count');

    let scannedSet = new Set();
    let worker = null;

    async function initWorker() {
        statusBadge.innerText = "載入辨識引擎...";
        worker = await Tesseract.createWorker('eng');
        await worker.setParameters({ tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ-' });
        statusBadge.innerText = "引擎已就緒";
    }

    async function performOcr(source) {
        if (!worker) await initWorker();
        statusBadge.innerText = "正在分析圖片...";
        
        const tCtx = tempCanvas.getContext('2d');
        const w = source.naturalWidth;
        const h = source.naturalHeight;
        tempCanvas.width = w; tempCanvas.height = h;
        
        tCtx.filter = 'grayscale(100%) contrast(180%) brightness(100%)';
        tCtx.drawImage(source, 0, 0);

        const { data } = await worker.recognize(tempCanvas);
        
        let count = 0;
        data.words.forEach(word => {
            let text = word.text.toUpperCase().replace(/S/g, '5').replace(/Q/g, '0');
            // 驗證 19 位且英數混合
            if (/^[A-Z0-9-]{19}$/.test(text) && /[0-9]/.test(text) && /[A-Z]/.test(text)) {
                count++;
                addResult(text);
            }
        });
        statusBadge.innerText = count > 0 ? `掃描完成，找到 ${count} 組` : "此張照片未發現序號";
        updateCount();
    }

    fileInput.onchange = (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        
        galleryTray.innerHTML = ""; 
        placeholderText.style.display = 'none';
        
        files.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = document.createElement('img');
                img.src = ev.target.result;
                img.className = 'thumb';
                img.onclick = () => {
                    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
                    img.classList.add('active');
                    loadPreview(img.src);
                };
                galleryTray.appendChild(img);
                if (index === 0) img.click(); 
            };
            reader.readAsDataURL(file);
        });
    };

    function loadPreview(src) {
        freezeFrame.src = src;
        freezeFrame.style.display = 'block';
        freezeFrame.onload = () => performOcr(freezeFrame);
    }

    uploadBtn.onclick = () => fileInput.click();

    function addResult(code) {
        if (scannedSet.has(code)) return;
        scannedSet.add(code);
        const div = document.createElement('div');
        div.className = 'code-row';
        div.id = `c-${code}`;
        div.innerHTML = `<span class="code-val">${code}</span><div class="btn-group">
            <button class="btn-sm" onclick="copyC('${code}')">複製</button>
            <button class="btn-sm" onclick="delC('${code}')">🗑️</button>
        </div>`;
        
        // 修正順序：將新的結果顯示在最底（加到容器末尾）
        codesContainer.appendChild(div);
        
        // 自動滾動到最底部
        resultList.scrollTop = resultList.scrollHeight;
    }

    function updateCount() {
        resultCount.innerText = `${scannedSet.size} 組`;
    }

    window.copyC = (c) => {
        navigator.clipboard.writeText(c).then(() => {
            const b = document.querySelector(`#c-${c} .btn-sm`);
            b.innerText = "已複製";
            b.classList.add('saved');
            setTimeout(() => {
                b.innerText = "複製";
                b.classList.remove('saved');
            }, 1000);
        });
    };

    window.delC = (c) => { 
        scannedSet.delete(c); 
        document.getElementById(`c-${c}`).remove(); 
        updateCount();
    };
    
    document.getElementById('clear-btn').onclick = () => { 
        if(confirm("確定清除所有掃描記錄？")) { 
            scannedSet.clear(); 
            codesContainer.innerHTML = '';
            updateCount();
        }
    };

    initWorker();
</script>
</body>
</html>
