<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>16位序號智能掃描器 v5</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg: #000;
            --panel-bg: rgba(28, 28, 30, 0.9);
            --accent: #00e676;
            --text: #ffffff;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: sans-serif; overflow: hidden; }

        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #overlay-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        .top-bar { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; z-index: 10; }
        .status-badge { background: rgba(0,0,0,0.6); color: var(--accent); padding: 6px 16px; border-radius: 20px; font-size: 13px; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }

        .bottom-sheet { position: absolute; bottom: 0; width: 100%; height: 38%; background: var(--panel-bg); backdrop-filter: blur(25px); border-radius: 24px 24px 0 0; display: flex; flex-direction: column; z-index: 10; border-top: 1px solid rgba(255,255,255,0.15); box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        
        .handle { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 4px; margin: 12px auto; }

        .controls { padding: 0 20px 12px; display: flex; gap: 10px; }
        #scan-btn { flex: 5; background: var(--accent); border: none; padding: 14px; border-radius: 14px; font-weight: bold; font-size: 16px; color: #000; transition: 0.2s; }
        #scan-btn:active { transform: scale(0.98); background: #00c853; }
        #clear-btn { flex: 1; background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 14px; font-size: 18px; }

        #result-list { flex: 1; overflow-y: auto; padding: 0 20px 20px; scroll-behavior: smooth; }
        .code-item { background: rgba(255,255,255,0.06); margin-bottom: 10px; padding: 14px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .code-text { color: var(--accent); font-family: 'Courier New', monospace; font-size: 17px; font-weight: bold; letter-spacing: 0.5px; }
        .item-actions { display: flex; gap: 8px; }
        .mini-btn { background: rgba(255,255,255,0.12); color: white; border: none; padding: 7px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; }
        .copy-btn.success { background: var(--accent); color: black; font-weight: bold; }

        canvas#temp-canvas { display: none; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="overlay-canvas"></canvas>
    </div>

    <div class="top-bar">
        <div class="status-badge" id="status">準備就緒 (尋找含 - 的 16 位序號)</div>
    </div>

    <div class="bottom-sheet">
        <div class="handle"></div>
        <div class="controls">
            <button id="scan-btn">📷 掃描畫面中所有 Code</button>
            <button id="clear-btn" title="清空全部">🗑️</button>
        </div>
        <div id="result-list"></div>
    </div>

    <canvas id="temp-canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const overlayCanvas = document.getElementById('overlay-canvas');
        const tempCanvas = document.getElementById('temp-canvas');
        const scanBtn = document.getElementById('scan-btn');
        const clearBtn = document.getElementById('clear-btn');
        const resultList = document.getElementById('result-list');
        const statusBadge = document.getElementById('status');

        let scannedSet = new Set();
        let worker = null;

        async function initWorker() {
            statusBadge.innerText = "正在載入辨識模組...";
            worker = await Tesseract.createWorker('eng');
            statusBadge.innerText = "✅ 已就緒";
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1280 } } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => resizeCanvas();
            } catch (e) {
                alert("相機啟動失敗，請確認是否授權。");
            }
        }

        function resizeCanvas() {
            overlayCanvas.width = window.innerWidth;
            overlayCanvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);

        scanBtn.onclick = async () => {
            if (!worker) await initWorker();
            
            scanBtn.disabled = true;
            statusBadge.innerText = "🔍 分析中...";
            const ctx = overlayCanvas.getContext('2d');
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

            const tCtx = tempCanvas.getContext('2d');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            tCtx.drawImage(video, 0, 0);

            const { data } = await worker.recognize(tempCanvas);
            
            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;
            const screenRatio = window.innerWidth / window.innerHeight;
            const videoRatio = vWidth / vHeight;
            
            let scale, offsetX = 0, offsetY = 0;
            if (screenRatio > videoRatio) {
                scale = window.innerWidth / vWidth;
                offsetY = (window.innerHeight - vHeight * scale) / 2;
            } else {
                scale = window.innerHeight / vHeight;
                offsetX = (window.innerWidth - vWidth * scale) / 2;
            }

            let foundCount = 0;

            data.words.forEach(word => {
                // 🔍 這裡修改了正則：允許英數與連字號，總長度需為 16 (含 -)
                const codeMatch = word.text.match(/[A-Z0-9-]{16}/);
                
                if (codeMatch) {
                    const cleanCode = codeMatch[0];
                    foundCount++;
                    
                    const { x0, y0, x1, y1 } = word.bbox;
                    ctx.strokeStyle = '#00e676';
                    ctx.lineWidth = 3;
                    ctx.fillStyle = 'rgba(0, 230, 118, 0.25)';
                    
                    const rx = x0 * scale + offsetX;
                    const ry = y0 * scale + offsetY;
                    const rw = (x1 - x0) * scale;
                    const rh = (y1 - y0) * scale;
                    
                    ctx.fillRect(rx, ry, rw, rh);
                    ctx.strokeRect(rx, ry, rw, rh);

                    addCode(cleanCode);
                }
            });

            statusBadge.innerText = foundCount > 0 ? `成功偵測 ${foundCount} 組！` : "未發現序號，請對準一點。";
            scanBtn.disabled = false;
        };

        function addCode(code) {
            if (scannedSet.has(code)) return;
            scannedSet.add(code);

            const div = document.createElement('div');
            div.className = 'code-item';
            div.id = `item-${code}`;
            div.innerHTML = `
                <span class="code-text">${code}</span>
                <div class="item-actions">
                    <button class="mini-btn copy-btn" onclick="copyCode('${code}')">複製</button>
                    <button class="mini-btn" onclick="deleteCode('${code}')">🗑️</button>
                </div>
            `;
            
            // 🔄 修改為 appendChild，讓新的 Code 出現在清單最下方
            resultList.appendChild(div);
            
            // 📜 自動滾動到最下方
            resultList.scrollTop = resultList.scrollHeight;
        }

        window.copyCode = (code) => {
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector(`#item-${code} .copy-btn`);
                btn.innerText = "OK!";
                btn.classList.add('success');
                setTimeout(() => {
                    btn.innerText = "複製";
                    btn.classList.remove('success');
                }, 1000);
            });
        };

        window.deleteCode = (code) => {
            scannedSet.delete(code);
            document.getElementById(`item-${code}`).remove();
        };

        clearBtn.onclick = () => {
            if(confirm("確定清除所有記錄？")) {
                scannedSet.clear();
                resultList.innerHTML = '';
            }
        };

        startCamera();
        initWorker();
    </script>
</body>
</html>
