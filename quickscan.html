<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Serial Scan Studio v10</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --bg: #0a0a0c; --card: #1c1c1e; --accent: #00e676; --text: #ffffff; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: -apple-system, sans-serif; color: var(--text); overflow: hidden; }

        /* 主顯示區 */
        #main-viewer { position: relative; width: 100%; height: 50%; background: #000; overflow: hidden; border-bottom: 1px solid #333; }
        #video, #freeze-frame { width: 100%; height: 100%; object-fit: contain; }
        #overlay-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        /* 狀態列 */
        .status-bar { position: absolute; top: 15px; width: 100%; display: flex; justify-content: center; z-index: 10; pointer-events: none; }
        .badge { background: rgba(0,0,0,0.7); color: var(--accent); padding: 6px 14px; border-radius: 20px; font-size: 12px; border: 1px solid var(--accent); backdrop-filter: blur(10px); }

        /* 底部控制面板 */
        .dashboard { position: absolute; bottom: 0; width: 100%; height: 50%; background: var(--card); display: flex; flex-direction: column; border-radius: 20px 20px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        
        /* 檔案預覽滑軌 (專業感的關鍵) */
        .gallery-tray { display: flex; gap: 10px; padding: 15px; overflow-x: auto; background: rgba(0,0,0,0.2); border-bottom: 1px solid #333; height: 80px; align-items: center; }
        .gallery-tray::-webkit-scrollbar { display: none; }
        .thumb { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; opacity: 0.5; border: 2px solid transparent; transition: 0.3s; flex-shrink: 0; cursor: pointer; }
        .thumb.active { opacity: 1; border-color: var(--accent); transform: scale(1.1); }
        .thumb.processed::after { content: '✓'; position: absolute; background: var(--accent); color: #000; border-radius: 50%; width: 15px; height: 15px; font-size: 10px; display: flex; align-items: center; justify-content: center; top: 0; right: 0; }

        /* 控制按鈕 */
        .action-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; padding: 15px; }
        button { border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #scan-btn { background: var(--accent); color: #000; padding: 15px; font-size: 16px; }
        #upload-btn { background: #3a3a3c; color: white; padding: 15px; }
        #clear-btn { background: transparent; color: #ff453a; font-size: 12px; padding: 5px; text-decoration: underline; }

        /* 結果清單 */
        #result-list { flex: 1; overflow-y: auto; padding: 0 15px 15px; }
        .code-row { background: rgba(255,255,255,0.05); margin-bottom: 8px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .code-val { font-family: monospace; font-size: 15px; color: var(--accent); }
        .btn-group { display: flex; gap: 5px; }
        .btn-sm { background: #3a3a3c; color: white; padding: 6px 10px; border-radius: 6px; font-size: 12px; }
        
        #file-input { display: none; }
        canvas#temp-canvas { display: none; }
    </style>
</head>
<body>

<div id="main-viewer">
    <video id="video" autoplay playsinline></video>
    <img id="freeze-frame" style="display:none;">
    <canvas id="overlay-canvas"></canvas>
    <div class="status-bar"><div class="badge" id="status">Ready</div></div>
</div>

<div class="dashboard">
    <div class="gallery-tray" id="gallery-tray">
        <span style="color:#666; font-size:12px; margin-left:10px;">尚未上傳圖片...</span>
    </div>

    <div class="action-grid">
        <button id="scan-btn">📷 拍照 / 掃描當前</button>
        <button id="upload-btn">📂 批次上傳</button>
        <div style="grid-column: span 2; text-align: center;">
            <button id="clear-btn">清空所有記錄</button>
        </div>
    </div>

    <div id="result-list"></div>
</div>

<input type="file" id="file-input" multiple accept="image/*">
<canvas id="temp-canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const freezeFrame = document.getElementById('freeze-frame');
    const overlayCanvas = document.getElementById('overlay-canvas');
    const tempCanvas = document.getElementById('temp-canvas');
    const scanBtn = document.getElementById('scan-btn');
    const uploadBtn = document.getElementById('upload-btn');
    const fileInput = document.getElementById('file-input');
    const galleryTray = document.getElementById('gallery-tray');
    const resultList = document.getElementById('result-list');
    const statusBadge = document.getElementById('status');

    let scannedSet = new Set();
    let worker = null;
    let isFrozen = false;

    async function initWorker() {
        statusBadge.innerText = "Initializing AI...";
        worker = await Tesseract.createWorker('eng');
        await worker.setParameters({ tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ-' });
        statusBadge.innerText = "Engine Ready";
    }

    async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1920 } } });
        video.srcObject = stream;
    }

    // 處理圖片掃描
    async function performOcr(source) {
        if (!worker) await initWorker();
        statusBadge.innerText = "Scanning...";
        
        const tCtx = tempCanvas.getContext('2d');
        const w = source.videoWidth || source.naturalWidth;
        const h = source.videoHeight || source.naturalHeight;
        tempCanvas.width = w; tempCanvas.height = h;
        
        tCtx.filter = 'grayscale(100%) contrast(180%) brightness(100%)';
        tCtx.drawImage(source, 0, 0);

        const { data } = await worker.recognize(tempCanvas);
        
        const ctx = overlayCanvas.getContext('2d');
        overlayCanvas.width = window.innerWidth;
        overlayCanvas.height = window.innerHeight;
        ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

        const scale = Math.min(window.innerWidth / w, (window.innerHeight * 0.5) / h);
        const offsetX = (window.innerWidth - w * scale) / 2;
        const offsetY = ((window.innerHeight * 0.5) - h * scale) / 2;

        let count = 0;
        data.words.forEach(word => {
            let text = word.text.toUpperCase().replace(/S/g, '5').replace(/Q/g, '0');
            if (/^[A-Z0-9-]{19}$/.test(text) && /[0-9]/.test(text) && /[A-Z]/.test(text)) {
                count++;
                const { x0, y0, x1, y1 } = word.bbox;
                ctx.fillStyle = 'rgba(0, 230, 118, 0.3)';
                ctx.strokeStyle = '#00e676';
                ctx.strokeRect(x0 * scale + offsetX, y0 * scale + offsetY, (x1-x0) * scale, (y1-y0) * scale);
                addResult(text);
            }
        });
        statusBadge.innerText = count > 0 ? `Found ${count} Codes` : "No Codes Found";
        scanBtn.disabled = false;
    }

    // 批次上傳處理
    fileInput.onchange = (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        
        galleryTray.innerHTML = ""; // 清空舊預覽
        files.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = document.createElement('img');
                img.src = ev.target.result;
                img.className = 'thumb';
                img.onclick = () => {
                    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
                    img.classList.add('active');
                    switchToImage(img.src);
                };
                galleryTray.appendChild(img);
                if (index === 0) img.click(); // 自動載入第一張
            };
            reader.readAsDataURL(file);
        });
    };

    function switchToImage(src) {
        video.style.display = 'none';
        freezeFrame.src = src;
        freezeFrame.style.display = 'block';
        isFrozen = true;
        scanBtn.innerText = "🔄 掃描當前圖片 / 返回相機";
        
        freezeFrame.onload = () => performOcr(freezeFrame);
    }

    function unfreeze() {
        video.style.display = 'block';
        freezeFrame.style.display = 'none';
        overlayCanvas.getContext('2d').clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        isFrozen = false;
        scanBtn.innerText = "📷 拍照掃描";
        statusBadge.innerText = "Camera Mode";
    }

    scanBtn.onclick = () => {
        if (isFrozen) {
            if (freezeFrame.style.display === 'block') {
                performOcr(freezeFrame); // 再次掃描當前圖片
                // 這裡可以做個邏輯：點擊第二次回相機
                setTimeout(() => { if(confirm("要返回實時相機嗎？")) unfreeze(); }, 500);
            } else {
                unfreeze();
            }
        } else {
            // 拍照掃描邏輯
            const tCtx = tempCanvas.getContext('2d');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            tCtx.drawImage(video, 0, 0);
            switchToImage(tempCanvas.toDataURL());
        }
    };

    uploadBtn.onclick = () => fileInput.click();

    function addResult(code) {
        if (scannedSet.has(code)) return;
        scannedSet.add(code);
        const div = document.createElement('div');
        div.className = 'code-row';
        div.id = `c-${code}`;
        div.innerHTML = `<span class="code-val">${code}</span><div class="btn-group">
            <button class="btn-sm" onclick="copyC('${code}')">Copy</button>
            <button class="btn-sm" onclick="delC('${code}')">🗑️</button>
        </div>`;
        resultList.appendChild(div);
        resultList.scrollTop = resultList.scrollHeight;
    }

    window.copyC = (c) => {
        navigator.clipboard.writeText(c).then(() => {
            const b = document.querySelector(`#c-${c} .btn-sm`);
            b.innerText = "Saved";
            setTimeout(() => b.innerText = "Copy", 1000);
        });
    };

    window.delC = (c) => { scannedSet.delete(c); document.getElementById(`c-${c}`).remove(); };
    clearBtn.onclick = () => { if(confirm("Clear all?")) { scannedSet.clear(); resultList.innerHTML = ''; }};

    startCamera();
    initWorker();
</script>
</body>
</html>
