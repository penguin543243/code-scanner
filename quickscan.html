<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>16位序號智能掃描器</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg: #000;
            --panel-bg: rgba(28, 28, 30, 0.85);
            --accent: #00e676;
            --text: #ffffff;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: sans-serif; overflow: hidden; }

        /* 全螢幕相機 */
        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        /* 畫布：用來繪製 Highlight 高亮框 */
        #overlay-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* UI 面板 */
        .top-bar { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; z-index: 10; }
        .status-badge { background: rgba(0,0,0,0.6); color: var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 12px; backdrop-filter: blur(5px); }

        .bottom-sheet { position: absolute; bottom: 0; width: 100%; height: 35%; background: var(--panel-bg); backdrop-filter: blur(20px); border-radius: 20px 20px 0 0; display: flex; flex-direction: column; z-index: 10; border-top: 1px solid rgba(255,255,255,0.1); }
        
        .handle { width: 40px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 5px; margin: 10px auto; }

        .controls { padding: 0 20px 10px; display: flex; gap: 10px; }
        #scan-btn { flex: 4; background: var(--accent); border: none; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 16px; }
        #clear-btn { flex: 1; background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 12px; font-size: 18px; }

        /* 列表樣式 */
        #result-list { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
        .code-item { background: rgba(255,255,255,0.05); margin-bottom: 8px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .code-text { color: var(--accent); font-family: monospace; font-size: 16px; font-weight: bold; }
        .item-actions { display: flex; gap: 5px; }
        .mini-btn { background: rgba(255,255,255,0.1); color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        .copy-btn.success { background: var(--accent); color: black; }

        canvas#temp-canvas { display: none; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="overlay-canvas"></canvas>
    </div>

    <div class="top-bar">
        <div class="status-badge" id="status">準備就緒 (尋找 16 位序號)</div>
    </div>

    <div class="bottom-sheet">
        <div class="handle"></div>
        <div class="controls">
            <button id="scan-btn">📷 掃描畫面中所有 Code</button>
            <button id="clear-btn" title="清空全部">🗑️</button>
        </div>
        <div id="result-list"></div>
    </div>

    <canvas id="temp-canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const overlayCanvas = document.getElementById('overlay-canvas');
        const tempCanvas = document.getElementById('temp-canvas');
        const scanBtn = document.getElementById('scan-btn');
        const clearBtn = document.getElementById('clear-btn');
        const resultList = document.getElementById('result-list');
        const statusBadge = document.getElementById('status');

        let scannedSet = new Set();
        let worker = null;

        // 初始化 Tesseract Worker
        async function initWorker() {
            statusBadge.innerText = "正在初始化引擎...";
            worker = await Tesseract.createWorker('eng');
            statusBadge.innerText = "✅ 引擎已就緒";
        }

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 1280 } } 
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                resizeCanvas();
            };
        }

        function resizeCanvas() {
            overlayCanvas.width = window.innerWidth;
            overlayCanvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);

        scanBtn.onclick = async () => {
            if (!worker) await initWorker();
            
            scanBtn.disabled = true;
            statusBadge.innerText = "正在分析畫面...";
            const ctx = overlayCanvas.getContext('2d');
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

            // 擷取當前畫面
            const tCtx = tempCanvas.getContext('2d');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            tCtx.drawImage(video, 0, 0);

            // 辨識
            const { data } = await worker.recognize(tempCanvas);
            
            // 比例計算（因為影片是 cover，畫面會被裁切）
            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;
            const screenRatio = window.innerWidth / window.innerHeight;
            const videoRatio = vWidth / vHeight;
            
            let scale, offsetX = 0, offsetY = 0;
            if (screenRatio > videoRatio) {
                scale = window.innerWidth / vWidth;
                offsetY = (window.innerHeight - vHeight * scale) / 2;
            } else {
                scale = window.innerHeight / vHeight;
                offsetX = (window.innerWidth - vWidth * scale) / 2;
            }

            let foundCount = 0;

            // 遍歷所有辨識到的「詞塊」
            data.words.forEach(word => {
                // 🔍 核心邏輯：過濾出剛好 16 位的英數序號
                const cleanText = word.text.replace(/[^A-Z0-9]/g, '');
                if (cleanText.length === 16) {
                    foundCount++;
                    
                    // 繪製 Highlight 高亮框
                    const { x0, y0, x1, y1 } = word.bbox;
                    ctx.strokeStyle = '#00e676';
                    ctx.lineWidth = 3;
                    ctx.fillStyle = 'rgba(0, 230, 118, 0.3)';
                    
                    const rx = x0 * scale + offsetX;
                    const ry = y0 * scale + offsetY;
                    const rw = (x1 - x0) * scale;
                    const rh = (y1 - y0) * scale;
                    
                    ctx.fillRect(rx, ry, rw, rh);
                    ctx.strokeRect(rx, ry, rw, rh);

                    // 加入清單
                    addCode(cleanText);
                }
            });

            statusBadge.innerText = foundCount > 0 ? `偵測到 ${foundCount} 個序號！` : "未發現符合 16 位的序號";
            scanBtn.disabled = false;
        };

        function addCode(code) {
            if (scannedSet.has(code)) return;
            scannedSet.add(code);

            const div = document.createElement('div');
            div.className = 'code-item';
            div.id = `item-${code}`;
            div.innerHTML = `
                <span class="code-text">${code}</span>
                <div class="item-actions">
                    <button class="mini-btn copy-btn" onclick="copyCode('${code}')">複製</button>
                    <button class="mini-btn" onclick="deleteCode('${code}')">🗑️</button>
                </div>
            `;
            resultList.prepend(div);
        }

        window.copyCode = (code) => {
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector(`#item-${code} .copy-btn`);
                btn.innerText = "已複製";
                btn.classList.add('success');
                setTimeout(() => {
                    btn.innerText = "複製";
                    btn.classList.remove('success');
                }, 1500);
            });
        };

        window.deleteCode = (code) => {
            scannedSet.delete(code);
            document.getElementById(`item-${code}`).remove();
        };

        clearBtn.onclick = () => {
            if(confirm("清空所有記錄？")) {
                scannedSet.clear();
                resultList.innerHTML = '';
                statusBadge.innerText = "記錄已清空";
            }
        };

        startCamera();
        initWorker();
    </script>
</body>
</html>
</html>
