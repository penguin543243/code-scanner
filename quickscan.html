<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>19位序號全能掃描器 v8</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg: #000;
            --panel-bg: rgba(28, 28, 30, 0.98);
            --accent: #00e676;
            --text: #ffffff;
            --secondary: rgba(255, 255, 255, 0.15);
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: -apple-system, sans-serif; overflow: hidden; }

        /* 顯示區域 */
        #view-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #freeze-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; background: #000; display: none; z-index: 2; }
        #overlay-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 3; }

        /* 頂部狀態 */
        .top-bar { position: absolute; top: 15px; width: 100%; display: flex; justify-content: center; z-index: 10; }
        .status-badge { background: rgba(0,0,0,0.8); color: var(--accent); padding: 8px 16px; border-radius: 20px; font-size: 13px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }

        /* 底部面板 */
        .bottom-sheet { position: absolute; bottom: 0; width: 100%; height: 45%; background: var(--panel-bg); backdrop-filter: blur(25px); border-radius: 24px 24px 0 0; display: flex; flex-direction: column; z-index: 10; border-top: 1px solid rgba(255,255,255,0.2); }
        .handle { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 4px; margin: 12px auto; }

        .controls { padding: 0 20px 15px; display: flex; flex-direction: column; gap: 10px; }
        .main-btns { display: flex; gap: 10px; }
        
        button { border: none; border-radius: 16px; font-weight: bold; transition: 0.2s; cursor: pointer; }
        #scan-btn { flex: 2; background: var(--accent); color: #000; padding: 16px; font-size: 16px; box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3); }
        #upload-btn { flex: 1; background: var(--secondary); color: white; padding: 16px; font-size: 16px; }
        #clear-btn { background: rgba(207, 102, 121, 0.2); color: #cf6679; padding: 10px; font-size: 14px; width: 100%; margin-top: 5px; }

        #scan-btn.frozen { background: #444; color: white; }

        /* 隱藏的檔案輸入框 */
        #file-input { display: none; }

        /* 列表樣式 */
        #result-list { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
        .code-item { background: rgba(255,255,255,0.06); margin-bottom: 10px; padding: 14px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .code-text { color: var(--accent); font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; }
        .item-actions { display: flex; gap: 8px; }
        .mini-btn { background: rgba(255,255,255,0.12); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 13px; }
        .copy-btn.success { background: var(--accent); color: black; }

        canvas#temp-canvas { display: none; }
    </style>
</head>
<body>

    <div id="view-container">
        <video id="video" autoplay playsinline></video>
        <img id="freeze-frame">
        <canvas id="overlay-canvas"></canvas>
    </div>

    <div class="top-bar">
        <div class="status-badge" id="status">準備就緒 (相機/相簿)</div>
    </div>

    <div class="bottom-sheet">
        <div class="handle"></div>
        <div class="controls">
            <div class="main-btns">
                <button id="scan-btn">📷 拍照掃描</button>
                <button id="upload-btn">📂 相簿上傳</button>
            </div>
            <button id="clear-btn">🗑️ 清空所有記錄</button>
            <input type="file" id="file-input" accept="image/*">
        </div>
        <div id="result-list"></div>
    </div>

    <canvas id="temp-canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const freezeFrame = document.getElementById('freeze-frame');
        const overlayCanvas = document.getElementById('overlay-canvas');
        const tempCanvas = document.getElementById('temp-canvas');
        const scanBtn = document.getElementById('scan-btn');
        const uploadBtn = document.getElementById('upload-btn');
        const fileInput = document.getElementById('file-input');
        const clearBtn = document.getElementById('clear-btn');
        const resultList = document.getElementById('result-list');
        const statusBadge = document.getElementById('status');

        let scannedSet = new Set();
        let worker = null;
        let isFrozen = false;

        async function initWorker() {
            statusBadge.innerText = "載入辨識引擎...";
            worker = await Tesseract.createWorker('eng');
            await worker.setParameters({
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNPRTUVWXYZ0123456789-',
            });
            statusBadge.innerText = "✅ 引擎就緒";
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1920 } } 
                });
                video.srcObject = stream;
            } catch (e) {
                statusBadge.innerText = "❌ 無法開啟相機";
            }
        }

        // --- 核心辨識函式 ---
        async function performOcr(sourceElement) {
            if (!worker) await initWorker();
            statusBadge.innerText = "🔍 正在分析圖片...";
            
            const tCtx = tempCanvas.getContext('2d');
            
            // 處理來源可能是 video 或 img
            const srcW = sourceElement.videoWidth || sourceElement.naturalWidth;
            const srcH = sourceElement.videoHeight || sourceElement.naturalHeight;
            
            tempCanvas.width = srcW;
            tempCanvas.height = srcH;
            
            // 預處理濾鏡
            tCtx.filter = 'grayscale(100%) contrast(150%) brightness(110%)';
            tCtx.drawImage(sourceElement, 0, 0, srcW, srcH);

            const { data } = await worker.recognize(tempCanvas);
            
            // 清除舊的高亮
            const ctx = overlayCanvas.getContext('2d');
            overlayCanvas.width = window.innerWidth;
            overlayCanvas.height = window.innerHeight;
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

            // 計算縮放比例 (以適應螢幕顯示)
            const screenW = window.innerWidth;
            const screenH = window.innerHeight;
            const scale = Math.min(screenW / srcW, screenH / srcH);
            const offsetX = (screenW - srcW * scale) / 2;
            const offsetY = (screenH - srcH * scale) / 2;

            let count = 0;
            data.words.forEach(word => {
                let text = word.text.toUpperCase().replace(/S/g, '5').replace(/Q/g, '0');
                const match = text.match(/[A-Z0-9-]{19}/);
                
                if (match) {
                    count++;
                    const code = match[0];
                    const { x0, y0, x1, y1 } = word.bbox;
                    
                    ctx.fillStyle = 'rgba(0, 230, 118, 0.3)';
                    ctx.strokeStyle = '#00e676';
                    ctx.lineWidth = 2;
                    ctx.fillRect(x0 * scale + offsetX, y0 * scale + offsetY, (x1 - x0) * scale, (y1 - y0) * scale);
                    ctx.strokeRect(x0 * scale + offsetX, y0 * scale + offsetY, (x1 - x0) * scale, (y1 - y0) * scale);
                    
                    addCode(code);
                }
            });

            statusBadge.innerText = count > 0 ? `偵測到 ${count} 組序號` : "未發現 19 位序號";
            scanBtn.disabled = false;
        }

        // --- 事件處理 ---

        // 拍照掃描
        scanBtn.onclick = () => {
            if (isFrozen) {
                unfreeze();
                return;
            }
            freezeFromVideo();
            performOcr(video);
        };

        // 相簿上傳
        uploadBtn.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                freezeFrame.src = event.target.result;
                freezeFrame.onload = () => {
                    freezeFromImage();
                    performOcr(freezeFrame);
                };
            };
            reader.readAsDataURL(file);
        };

        function freezeFromVideo() {
            const tCtx = tempCanvas.getContext('2d');
            tCtx.filter = 'none';
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            tCtx.drawImage(video, 0, 0);
            freezeFrame.src = tempCanvas.toDataURL('image/jpeg');
            freezeFrame.style.display = 'block';
            isFrozen = true;
            scanBtn.innerText = "🔄 返回相機";
            scanBtn.classList.add('frozen');
        }

        function freezeFromImage() {
            freezeFrame.style.display = 'block';
            isFrozen = true;
            scanBtn.innerText = "🔄 返回相機";
            scanBtn.classList.add('frozen');
        }

        function unfreeze() {
            freezeFrame.style.display = 'none';
            const ctx = overlayCanvas.getContext('2d');
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            isFrozen = false;
            scanBtn.innerText = "📷 拍照掃描";
            scanBtn.classList.remove('frozen');
            statusBadge.innerText = "準備就緒";
            fileInput.value = ""; // 重置檔案輸入
        }

        function addCode(code) {
            if (scannedSet.has(code)) return;
            scannedSet.add(code);
            const div = document.createElement('div');
            div.className = 'code-item';
            div.id = `item-${code}`;
            div.innerHTML = `<span class="code-text">${code}</span><div class="item-actions">
                <button class="mini-btn copy-btn" onclick="copyCode('${code}')">複製</button>
                <button class="mini-btn" onclick="deleteCode('${code}')">🗑️</button>
            </div>`;
            resultList.appendChild(div);
            resultList.scrollTop = resultList.scrollHeight;
        }

        window.copyCode = (code) => {
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector(`#item-${code} .copy-btn`);
                btn.innerText = "OK!";
                btn.classList.add('success');
                setTimeout(() => { btn.innerText = "複製"; btn.classList.remove('success'); }, 1000);
            });
        };

        window.deleteCode = (code) => {
            scannedSet.delete(code);
            document.getElementById(`item-${code}`).remove();
        };

        clearBtn.onclick = () => { if(confirm("確定清空所有記錄？")) { scannedSet.clear(); resultList.innerHTML = ''; } };

        startCamera();
        initWorker();
    </script>
</body>
</html>
