<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Serial Scan v14 - 專用調優版</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --bg: #ffffff; --card: #f8f9fa; --accent: #6f42c1; --text: #212529; --border: #dee2e6; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: sans-serif; color: var(--text); overflow: hidden; }
        #main-viewer { position: relative; width: 100%; height: 30%; background: #f1f3f5; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border); }
        #freeze-frame { width: 100%; height: 100%; object-fit: contain; }
        .status-bar { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 10; }
        .badge { background: white; color: var(--accent); padding: 4px 12px; border-radius: 20px; font-size: 11px; border: 1px solid var(--accent); font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .dashboard { position: absolute; bottom: 0; width: 100%; height: 70%; background: var(--bg); display: flex; flex-direction: column; border-radius: 20px 20px 0 0; border-top: 1px solid var(--border); }
        .gallery-tray { display: flex; gap: 10px; padding: 10px; overflow-x: auto; background: var(--card); border-bottom: 1px solid var(--border); height: 80px; align-items: center; }
        .thumb { width: 60px; height: 60px; border-radius: 6px; object-fit: cover; opacity: 0.4; border: 2px solid transparent; flex-shrink: 0; }
        .thumb.active { opacity: 1; border-color: var(--accent); }
        .action-area { padding: 15px; text-align: center; }
        #upload-btn { background: var(--accent); color: white; padding: 14px 30px; border: none; border-radius: 12px; font-weight: bold; width: 100%; font-size: 16px; }
        #result-list { flex: 1; overflow-y: auto; padding: 0 15px; }
        .list-header { font-size: 11px; color: #6c757d; padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .code-row { background: var(--card); margin: 8px 0; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .code-val { font-family: monospace; font-size: 16px; color: var(--accent); font-weight: bold; }
        .btn-sm { background: white; color: var(--text); padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); font-size: 12px; }
        #file-input, canvas#temp-canvas { display: none; }
    </style>
</head>
<body>

<div id="main-viewer">
    <img id="freeze-frame">
    <div class="status-bar"><div class="badge" id="status">等待上傳...</div></div>
</div>

<div class="dashboard">
    <div class="gallery-tray" id="gallery-tray"></div>
    <div class="action-area">
        <button id="upload-btn">📂 批量選取抽選券照片</button>
        <button id="clear-btn" style="background:none; border:none; color:#999; font-size:11px; margin-top:8px; text-decoration:underline;">清空記錄</button>
    </div>
    <div id="result-list">
        <div class="list-header"><span>辨識結果 (8-13位英數混合)</span><span id="result-count">0 組</span></div>
        <div id="codes-container"></div>
    </div>
</div>

<input type="file" id="file-input" multiple accept="image/*">
<canvas id="temp-canvas"></canvas>

<script>
    const freezeFrame = document.getElementById('freeze-frame');
    const tempCanvas = document.getElementById('temp-canvas');
    const uploadBtn = document.getElementById('upload-btn');
    const fileInput = document.getElementById('file-input');
    const galleryTray = document.getElementById('gallery-tray');
    const codesContainer = document.getElementById('codes-container');
    const statusBadge = document.getElementById('status');
    const resultCount = document.getElementById('result-count');

    let scannedSet = new Set();
    let worker = null;

    async function initWorker() {
        statusBadge.innerText = "正在優化引擎...";
        worker = await Tesseract.createWorker(['eng', 'jpn']);
        // 限制字元集，從源頭切斷非英數亂碼
        await worker.setParameters({
            tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzシリアルナンバー序號No'
        });
        statusBadge.innerText = "準備就緒 (8-13位模式)";
    }

    async function performOcr(source) {
        if (!worker) await initWorker();
        statusBadge.innerText = "精確辨識中...";
        
        const tCtx = tempCanvas.getContext('2d');
        tempCanvas.width = source.naturalWidth;
        tempCanvas.height = source.naturalHeight;
        
        // 針對抽選券的特殊濾鏡：強化文字邊緣
        tCtx.filter = 'grayscale(100%) contrast(200%) brightness(90%)';
        tCtx.drawImage(source, 0, 0);

        const { data } = await worker.recognize(tempCanvas);
        
        let batchCount = 0;
        data.words.forEach(word => {
            // 每張照片最多抓 10 個，防止亂碼
            if (batchCount >= 10) return;

            let text = word.text.trim().replace(/S/g, '5').replace(/Q/g, '0');
            
            // 💡 嚴格過濾規則：
            // 1. 長度必須在 8 到 13 位之間
            // 2. 必須同時包含數字 [0-9] 和 字母 [A-Za-z]
            const isTargetLength = text.length >= 8 && text.length <= 13;
            const hasNumber = /[0-9]/.test(text);
            const hasLetter = /[a-zA-Z]/.test(text);
            const isNotJapanese = !/[シリアルナンバー序號]/.test(text);

            if (isTargetLength && hasNumber && hasLetter && isNotJapanese) {
                addResult(text);
                batchCount++;
            }
        });

        statusBadge.innerText = `掃描完畢 (本張新增 ${batchCount} 組)`;
        updateCount();
    }

    fileInput.onchange = (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        galleryTray.innerHTML = "";
        files.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = document.createElement('img');
                img.src = ev.target.result;
                img.className = 'thumb';
                img.onclick = () => {
                    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
                    img.classList.add('active');
                    loadPreview(img.src);
                };
                galleryTray.appendChild(img);
                if (index === 0) img.click();
            };
            reader.readAsDataURL(file);
        });
    };

    function loadPreview(src) {
        freezeFrame.src = src;
        freezeFrame.onload = () => performOcr(freezeFrame);
    }

    uploadBtn.onclick = () => fileInput.click();

    function addResult(code) {
        if (scannedSet.has(code)) return;
        scannedSet.add(code);
        const div = document.createElement('div');
        div.className = 'code-row';
        div.id = `c-${code}`;
        div.innerHTML = `<span class="code-val">${code}</span><button class="btn-sm" onclick="copyC('${code}')">複製</button>`;
        codesContainer.appendChild(div);
        document.getElementById('result-list').scrollTop = document.getElementById('result-list').scrollHeight;
    }

    function updateCount() { resultCount.innerText = `${scannedSet.size} 組`; }

    window.copyC = (c) => {
        navigator.clipboard.writeText(c).then(() => {
            const b = document.querySelector(`#c-${c} button`);
            b.innerText = "OK";
            setTimeout(() => b.innerText = "複製", 800);
        });
    };

    document.getElementById('clear-btn').onclick = () => {
        if(confirm("清除？")) { scannedSet.clear(); codesContainer.innerHTML = ''; updateCount(); }
    };

    initWorker();
</script>
</body>
</html>
